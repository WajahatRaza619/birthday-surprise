<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Flow 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ffd1dc, #ffe6f0);
}

/* Screens */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ================= ENVELOPE ================= */

.glow {
  position: absolute;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(255,105,135,0.4), transparent);
  border-radius: 50%;
  opacity: 0;
  transition: 0.8s;
  pointer-events: none;
}

.envelope {
  position: relative;
  width: 320px;
  height: 220px;
  background: #ff6f91;
  border-radius: 10px;
  cursor: pointer;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff4d73;
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 0.7s ease;
}

.card {
  position: absolute;
  width: 85%;
  max-width: 320px;
  height: 200px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);

  top: 55%;
  left: 50%;
  transform: translate(-50%, 0) scale(0.8);

  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;

  opacity: 0;
  transition: all 1s cubic-bezier(.68,-0.55,.27,1.55);
}

.open .flap {
  transform: rotateX(180deg);
}

.showCard {
  top: 20%;
  transform: translate(-50%, 0) scale(1);
  opacity: 1;
}

.showGlow {
  opacity: 1;
}

#typedText {
  color: #ff4d6d;
  font-size: 16px;
  line-height: 1.5;
}

/* Next button */
#nextBtn {
  position: absolute;
  top: 75%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

#nextBtn.show {
  opacity: 1;
  pointer-events: auto;
}

/* ================= QUESTION ================= */

.container {
  text-align: center;
}

h1 {
  color: #ff4d6d;
}

.buttons {
  position: relative;
  width: 320px;
  height: 220px;
  margin: auto;
}

button {
  padding: 14px 30px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* YES */
.yes {
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  position: absolute;
  left: 30px;
  top: 100px;
}

/* NO */
.no {
  background: white;
  color: #ff4d6d;
  border: 2px solid #ff4d6d;
  position: absolute;
  left: 170px;
  top: 100px;
}

/* Result */
.result {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 40px;
  color: #ff4d6d;
  opacity: 0;
  transition: 0.5s;
}

.showResult {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,192,203,0.6);
  opacity: 0;
}

.showOverlay {
  opacity: 1;
}

.taunt {
  margin-top: 10px;
  color: #ff6f91;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- ENVELOPE SCREEN -->
<div id="envelopeScreen" class="screen">

  <div class="glow" id="glow"></div>

  <div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>
  </div>

  <div class="card" id="card">
    <div id="typedText"></div>
  </div>

  <button id="nextBtn" onclick="goNext()">Next ➝</button>

</div>

<!-- QUESTION SCREEN -->
<div id="questionScreen" class="screen" style="display:none;">

  <div class="overlay" id="overlay"></div>

  <div class="container">
    <h1>So...you liked this and you’re happy with me now, right? 💖</h1>

    <div class="buttons" id="box">
      <button class="yes" onclick="sayYes()">YES 😍</button>
      <button class="no" id="noBtn">NO 😢</button>
    </div>
    <div class="taunt" id="taunt"></div>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
/* Envelope typing */
const message = `Dear Minal,
Keep that smile on, don’t overthink too much, you don’t always have to be overly independent. You’re doing great, and you’ll do amazing in the future. May every prayer with you lead you to success ✨.
Now stop smiling and give your feedback, I dare you to say NO`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  } else {
    document.getElementById("nextBtn").classList.add("show");
  }
}

function openEnvelope(el) {
  el.classList.add("open");
  document.getElementById("card").classList.add("showCard");
  document.getElementById("glow").classList.add("showGlow");
  setTimeout(typeWriter, 600);
}

/* Screen switch */
function goNext() {
  document.getElementById("envelopeScreen").style.display = "none";
  document.getElementById("questionScreen").style.display = "flex";
}

/* NO button escape */
const noBtn = document.getElementById("noBtn");
const box = document.getElementById("box");

let tries = 0;
const taunts = [
  "Try harder 😜",
  "Too slow 😂",
  "Catch me if you can 😏",
  "No chance 😆",
  "Almost... not really 😝",
  "Still trying? 😈",
  "You can't win 😎"
];
function moveButton() {
  const x = Math.random() * (box.clientWidth - noBtn.offsetWidth);
  const y = Math.random() * (box.clientHeight - noBtn.offsetHeight);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // ⭐ show taunt
  document.getElementById("taunt").innerHTML =
    taunts[tries % taunts.length];

  tries++;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* YES */
function sayYes() {
  document.getElementById("overlay").classList.add("showOverlay");
  document.getElementById("result").innerHTML = "I knew it! 😍💖";
  document.getElementById("result").classList.add("showResult");
}
</script>

</body>
</html>
